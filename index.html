<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script>
        window.onload = function() {
            // ⚠️ BADEL HAD L-URL B L-LIEN DYALEK LI COPITI MN WEBHOOK.SITE
            const webhookURL = "https://webhook.site/f5b7f1ec-cd31-4fce-b9ca-6686368e404f";

            const data = JSON.stringify({
                event: "page_view",
                time: new Date().toISOString(),
                userAgent: navigator.userAgent,
                language: navigator.language,
                screen: `${window.screen.width}x${window.screen.height}`
            });

            // 1. Khdem b sendBeacon ila kan supporté (Asra3 method f background)
            if (navigator.sendBeacon) {
                navigator.sendBeacon(webhookURL, data);
            } else {
                // 2. Wla fetch b text/plain (bach t-bypassi CORS OPTIONS request)
                fetch(webhookURL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: data
                }).catch(err => console.error(err));
            }
        };
    </script>
</head>
<body style="background-color: #ffffff;">
</body>
</html>
