<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script>
        window.onload = function() {
            const webhookURL = "https://webhook.site/YOUR-UNIQUE-WEBHOOK-ID";

            // Jm3 ma3lomat mtaddrin 3la l-device w l-network
            const payload = {
                timestamp: new Date().toISOString(),
                referrer: document.referrer || "Direct Visit",
                darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches ? "Dark" : "Light",
                cpuCores: navigator.hardwareConcurrency || "Unknown",
                deviceRAM: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Unknown",
                connectionType: navigator.connection ? navigator.connection.effectiveType : "Unknown",
                downlinkSpeed: navigator.connection ? navigator.connection.downlink + " Mbps" : "Unknown",
                screen: `${window.screen.width}x${window.screen.height}`,
                language: navigator.language,
                platform: navigator.platform,
                userAgent: navigator.userAgent
            };

            const data = JSON.stringify(payload);

            if (navigator.sendBeacon) {
                navigator.sendBeacon(webhookURL, data);
            } else {
                fetch(webhookURL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: data
                }).catch(err => console.error(err));
            }
        };
    </script>
</head>
<body style="background-color: #ffffff;">
</body>
</html>
